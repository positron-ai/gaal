name: CI

# Triggered on every pull request and push to main.
# Also exposed as a reusable workflow so release.yml can call it.
on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint: gofmt formatting check + go vet (make lint)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint (gofmt + go vet)
        run: make lint

  # ──────────────────────────────────────────────────────────────────────────
  # Changes: detect whether any non-documentation file was modified.
  # Gates build/test/coverage so markdown-only pushes skip expensive runners.
  # On workflow_call (used by release.yml) always forces code_changed=true.
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.decide.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether code changed
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE:     ${{ github.event.before }}
          SHA:        ${{ github.sha }}
          PR_BASE:    ${{ github.event.pull_request.base.sha }}
        run: |
          # workflow_call → called from release.yml; always run the full chain.
          if [ "$EVENT_NAME" = "workflow_call" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE"
            HEAD="$SHA"
          else
            # push event — guard against empty 'before' on first push to a branch.
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "code_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            BASE="$BEFORE"
            HEAD="$SHA"
          fi

          # Any file that is not *.md and not under docs/ counts as "code".
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" \
            | grep -Ev '\.md$' \
            | grep -Ev '^docs/' \
            | head -1)

          if [ -n "$CHANGED" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Build: cross-compile all release targets from the cheapest runners.
  # Validates every platform/arch compiles cleanly — no native runner needed.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    needs: [lint, changes]
    if: needs.changes.outputs.code_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest }
          - { goos: linux,   goarch: arm64, runner: ubuntu-latest }
          - { goos: darwin,  goarch: amd64, runner: macos-latest  }
          - { goos: darwin,  goarch: arm64, runner: macos-latest  }
          - { goos: windows, goarch: amd64, runner: ubuntu-latest, ext: .exe }
          - { goos: windows, goarch: arm64, runner: ubuntu-latest, ext: .exe }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          make build-cross
          BIN_CROSS=dist/gaal-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # ──────────────────────────────────────────────────────────────────────────
  # Test: unit tests with race detector — fast feedback on the two main targets.
  # Full platform coverage is done in release.yml.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: [build, changes]
    if: needs.changes.outputs.code_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux, runner: ubuntu-latest }
          - { name: macOS, runner: macos-latest  }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: make test-ci

      - name: Post test summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib, re

          def first_meaningful_line(text, maxlen):
              """Return the first non-empty line that is not a Go test runner
              prefix (=== RUN, --- SKIP, --- FAIL, PASS, FAIL, etc.).
              Escape pipe chars so they don't break the Markdown table."""
              skip_pat = re.compile(r"^(===|---|PASS|FAIL|ok\s|SKIP)", re.IGNORECASE)
              for raw in (text or "").splitlines():
                  line = raw.strip()
                  if line and not skip_pat.match(line):
                      return line.replace("|", "\\|")[:maxlen]
              return ""

          p = pathlib.Path("report/tests.xml")
          if not p.exists():
              print("No test report found.")
          else:
              tree = ET.parse(p)
              root = tree.getroot()
              suites  = root.findall("testsuite") or ([root] if root.tag == "testsuite" else [])
              tests   = sum(int(s.get("tests",   0)) for s in suites)
              failed  = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
              skipped = sum(int(s.get("skipped",  0)) for s in suites)
              passed  = tests - failed - skipped

              failures_list = []
              skipped_list  = []
              for suite in suites:
                  pkg = suite.get("name", "")
                  for tc in suite.findall("testcase"):
                      name = tc.get("name", "")
                      fail_node = tc.find("failure")
                      if fail_node is None:
                          fail_node = tc.find("error")
                      skip_node = tc.find("skipped")
                      if fail_node is not None:
                          raw = fail_node.get("message") or fail_node.text or ""
                          msg = first_meaningful_line(raw, 120)
                          failures_list.append((pkg, name, msg))
                      elif skip_node is not None:
                          raw = skip_node.get("message") or skip_node.text or ""
                          reason = first_meaningful_line(raw, 80)
                          skipped_list.append((pkg, name, reason))

              matrix_name = os.environ.get("MATRIX_NAME", "")
              summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
              with open(summary, "a") as f:
                  title = f"## Test Results" + (f" \u2014 {matrix_name}" if matrix_name else "")
                  f.write(title + "\n\n")
                  f.write("| Suites | Tests | \u2705 Passed | \u274c Failed | \u23ed Skipped |\n")
                  f.write("|--------|-------|-----------|-----------|----------|\n")
                  f.write(f"| {len(suites)} | {tests} | {passed} | {failed} | {skipped} |\n\n")

                  if failures_list:
                      f.write("### \u274c Failed tests\n\n")
                      f.write("| Package | Test | Message |\n")
                      f.write("|---------|------|---------|\n")
                      for pkg, name, msg in failures_list:
                          f.write(f"| `{pkg}` | `{name}` | {msg} |\n")
                      f.write("\n")

                  if skipped_list:
                      f.write("### \u23ed Skipped tests\n\n")
                      f.write("| Package | Test | Reason |\n")
                      f.write("|---------|------|--------|\n")
                      for pkg, name, reason in skipped_list:
                          f.write(f"| `{pkg}` | `{name}` | {reason} |\n")
                      f.write("\n")
          EOF
        env:
          MATRIX_NAME: ${{ matrix.name }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.name }}
          path: report/tests.xml
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # E2E: end-to-end test suite — runs gaal inside a Docker container,
  # asserts filesystem state after sync/prune scenarios. Layer 1 only —
  # the heavier CLI-verification layer runs separately on demand.
  # ──────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # ubuntu-latest ships with the Docker daemon and BuildKit enabled by
      # default — no extra setup step needed before `make test-e2e`.
      - name: Run e2e suite
        run: make test-e2e

  # ──────────────────────────────────────────────────────────────────────────
  # Coverage: generate HTML report and post summary to the job summary page
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate coverage report
        run: make coverage-ci

      - name: Post coverage summary
        run: |
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat report/coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: report/
          retention-days: 30
