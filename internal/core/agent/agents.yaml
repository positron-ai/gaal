# Built-in agent registry.
# Each entry maps an agent identifier to its file-system layout.
#
# Fields (*_dir):
#   project_skills_dir      – skills directory relative to the project root (must be relative, no "..")
#   global_skills_dir       – skills directory under the user home directory (~/ prefix required)
#   global_mcp_config_file  – user-global MCP server config file (~/ prefix, empty if unsupported)
#   project_mcp_config_file – workspace-scoped MCP server config file (~/ prefix, empty if unsupported)
#
# Fields (*_search) — used by "gaal audit" for discovery only:
#   project_skills_search   – project-relative dirs scanned at 1 level (empty = fallback to project_skills_dir)
#   global_skills_search    – home-relative dirs (~/) scanned at 1 level (empty = fallback to global_skills_dir)
#   pm_skills_search        – home-relative dirs (~/) from the agent's package manager, scanned recursively
#
# Behaviour keys — consumed by [internal/core/agent.BehaviorFor] to warn
# on no-op or unsupported combinations during sync/status:
#   supports_skills         – bool, default true. Set to false for agents that have no
#                             on-disk SKILL.md mechanism (claude-desktop is the canonical case).
#   supported_platforms     – list, default empty (= all). Allowed values: darwin, linux, windows.
#                             Use to flag an agent that only ships on a subset of platforms.
#
# Custom agents can be added by creating a file at:
#   $XDG_CONFIG_HOME/gaal/agents.yaml   (Linux)
#   $XDG_CONFIG_HOME/gaal/agents.yaml   (macOS, defaults to ~/.config/gaal/agents.yaml)
#   %AppData%\gaal\agents.yaml          (Windows)
# Custom entries extend the built-in list. They cannot override built-in entries.

# YAML anchors for shared path literals.
# The "defaults" mapping is ignored by the struct decoder (only "agents" is mapped).
defaults:
  project_skills_dir: &psd .agents/skills           # owned by the "generic" built-in
  global_agents_skills: &gas ~/.agents/skills        # owned by the "generic" built-in
  vscode_mcp_config: &vmc ~/.vscode/settings.json    # cline, github-copilot, roo

# Shared search lists (anchors for re-use across agents).
search_defaults:
  # Common project-level skill directories shared across ecosystems.
  common_project_search: &cps
    - .agents/skills
    - .github/skills
    - .claude/skills
  # Common global skill directories shared across ecosystems.
  common_global_search: &cgs
    - ~/.agents/skills
    - ~/.copilot/skills
    - ~/.claude/skills

agents:
  # Antigravity CLI (`agy`) — replaced the deprecated Gemini CLI (2026-06-18).
  # Skills use the vendor-neutral .agents convention; MCP uses agy's own
  # global file (shared with the Antigravity IDE). See agent-capabilities.md.
  agy:
    supports_generic_project: true
    supports_generic_global: true
    project_skills_dir: ""
    global_skills_dir: ""
    # Shared with the Antigravity IDE; project-local MCP is ignored by the CLI.
    global_mcp_config_file: ~/.gemini/config/mcp_config.json
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search: *cgs
    pm_skills_search: []

  amp:
    supports_generic_project: true
    project_skills_dir: ""
    global_skills_dir: ~/.config/agents/skills
    global_mcp_config_file: ~/.config/amp/settings.json
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.config/agents/skills
      - ~/.agents/skills
      - ~/.copilot/skills
      - ~/.claude/skills
    pm_skills_search: []

  antigravity:
    supports_generic_project: true
    project_skills_dir: ""
    global_skills_dir: ~/.gemini/antigravity/skills
    # Dedicated file, not ~/.gemini/settings.json (Gemini-CLI's). See agent-capabilities.md.
    global_mcp_config_file: ~/.gemini/config/mcp_config.json
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.gemini/antigravity/skills
      - ~/.gemini/skills
      - ~/.agents/skills
    pm_skills_search: []

  augment:
    project_skills_dir: .augment/skills
    global_skills_dir: ~/.augment/skills
    global_mcp_config_file: ~/.augment/settings.json
    project_mcp_config_file: ""
    project_skills_search:
      - .augment/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.augment/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  claude-code:
    project_skills_dir: .claude/skills
    global_skills_dir: ~/.claude/skills
    # ~/.claude.json carries OAuth tokens, per-project state, caches; the
    # mcpServers key is upserted in place and unrelated keys are preserved.
    global_mcp_config_file: ~/.claude.json
    project_mcp_config_file: .mcp.json
    project_skills_search:
      - .claude/skills
      - .agents/skills
      - .github/skills
    global_skills_search:
      - ~/.claude/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search:
      - ~/.claude/plugins/cache

  # claude-desktop is the GUI app, distinct from claude-code (the CLI).
  # Path below is the macOS canonical location; Claude Desktop is officially
  # macOS- and Windows-only — `supported_platforms` makes that explicit so
  # any sync targeting it on linux fires a behaviour warning.
  # Windows users can override this path via ~/.config/gaal/agents.yaml
  # to point at ~/AppData/Roaming/Claude/claude_desktop_config.json.
  # Skills are a Claude Code CLI feature; Claude Desktop has no on-disk
  # SKILL.md mechanism, so `supports_skills: false` flags installs as no-ops.
  claude-desktop:
    supports_generic_project: true
    supports_generic_global: true
    supports_skills: false
    supported_platforms: [darwin, windows]
    project_skills_dir: ""
    global_skills_dir: ""
    global_mcp_config_file: ~/Library/Application Support/Claude/claude_desktop_config.json
    project_mcp_config_file: ""
    project_skills_search: []
    global_skills_search: []
    pm_skills_search: []

  cline:
    supports_generic_project: true
    supports_generic_global: true
    project_skills_dir: ""
    global_skills_dir: ""
    global_mcp_config_file: *vmc
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search: *cgs
    pm_skills_search: []

  codex:
    supports_generic_project: true
    project_skills_dir: ""
    global_skills_dir: ~/.codex/skills
    global_mcp_config_file: ~/.codex/config.toml
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.codex/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  continue:
    project_skills_dir: .continue/skills
    global_skills_dir: ~/.continue/skills
    global_mcp_config_file: ~/.continue/config.json
    project_mcp_config_file: ""
    project_skills_search:
      - .continue/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.continue/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  cursor:
    supports_generic_project: true
    project_skills_dir: ""
    global_skills_dir: ~/.cursor/skills
    global_mcp_config_file: ~/.cursor/mcp.json
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.cursor/skills
      - ~/.agents/skills
      - ~/.copilot/skills
      - ~/.claude/skills
    pm_skills_search:
      - ~/.cursor/extensions

  generic:
    # Shared-convention agent. Owns .agents/skills (project) and
    # ~/.agents/skills (global) so audit attributes skills placed under
    # these vendor-neutral paths to `generic`. Also the sync target used
    # by any agent that sets supports_generic_project /
    # supports_generic_global: true.
    project_skills_dir: *psd
    global_skills_dir: *gas
    global_mcp_config_file: ""
    project_mcp_config_file: ""
    project_skills_search:
      - .agents/skills
    global_skills_search:
      - ~/.agents/skills
    pm_skills_search: []

  github-copilot:
    # https://code.visualstudio.com/docs/copilot/customization/agent-skills#_create-a-skill
    project_skills_dir: .github/skills
    global_skills_dir: ~/.copilot/skills
    global_mcp_config_file: *vmc
    project_mcp_config_file: ""
    project_skills_search:
      - .github/skills
      - .agents/skills
      - .claude/skills
    global_skills_search:
      - ~/.copilot/skills
      - ~/.claude/skills
      - ~/.agents/skills
    pm_skills_search:
      - ~/.vscode/agent-plugins

  goose:
    project_skills_dir: .goose/skills
    global_skills_dir: ~/.config/goose/skills
    global_mcp_config_file: ~/.config/goose/config.yaml
    project_mcp_config_file: ""
    project_skills_search:
      - .goose/skills
      - .agents/skills
      - .github/skills
    global_skills_search:
      - ~/.config/goose/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  kilo:
    project_skills_dir: .kilocode/skills
    global_skills_dir: ~/.kilocode/skills
    global_mcp_config_file: ~/.kilocode/mcp.json
    project_mcp_config_file: ""
    project_skills_search:
      - .kilocode/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.kilocode/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  kiro-cli:
    project_skills_dir: .kiro/skills
    global_skills_dir: ~/.kiro/skills
    global_mcp_config_file: ~/.kiro/settings/mcp.json
    project_mcp_config_file: ""
    project_skills_search:
      - .kiro/skills
      - .agents/skills
      - .github/skills
    global_skills_search:
      - ~/.kiro/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search:
      - ~/.kiro/extensions

  opencode:
    supports_generic_project: true
    project_skills_dir: ""
    global_skills_dir: ~/.config/opencode/skills
    global_mcp_config_file: ~/.config/opencode/config.json
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.config/opencode/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  openhands:
    project_skills_dir: .openhands/skills
    global_skills_dir: ~/.openhands/skills
    global_mcp_config_file: ~/.openhands/config.json
    project_mcp_config_file: ""
    project_skills_search:
      - .openhands/skills
      - .agents/skills
      - .github/skills
    global_skills_search:
      - ~/.openhands/skills
      - ~/.agents/skills
    pm_skills_search: []

  roo:
    project_skills_dir: .roo/skills
    global_skills_dir: ~/.roo/skills
    global_mcp_config_file: *vmc
    project_mcp_config_file: ""
    project_skills_search:
      - .roo/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.roo/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []

  trae:
    project_skills_dir: .trae/skills
    global_skills_dir: ~/.trae/skills
    global_mcp_config_file: ~/.trae/mcp.json
    project_mcp_config_file: ""
    project_skills_search:
      - .trae/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.trae/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search:
      - ~/.trae/extensions

  warp:
    supports_generic_project: true
    supports_generic_global: true
    project_skills_dir: ""
    global_skills_dir: ""
    global_mcp_config_file: ~/.warp/launch_configurations/mcp.json
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.agents/skills
      - ~/.warp/skills
      - ~/.copilot/skills
    pm_skills_search: []

  windsurf:
    project_skills_dir: .windsurf/skills
    global_skills_dir: ~/.codeium/windsurf/skills
    global_mcp_config_file: ~/.codeium/windsurf/mcp_settings.json
    project_mcp_config_file: ""
    project_skills_search:
      - .windsurf/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.codeium/windsurf/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search:
      - ~/.windsurf/extensions

  zencoder:
    project_skills_dir: .zencoder/skills
    global_skills_dir: ~/.zencoder/skills
    global_mcp_config_file: ~/.zencoder/mcp.json
    project_mcp_config_file: ""
    project_skills_search:
      - .zencoder/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.zencoder/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search: []
